name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mastodon-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile posting script
        run: python3 -m compileall -q mastodon-agent/scripts

  music-streaming-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ./music-streaming-agent
      - name: Smoke CLI
        run: music-agent plan "status"
